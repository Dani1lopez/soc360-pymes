services:
  
  postgres:
    image: postgres:16-alpine
    container_name: soc360_postgres
    profiles: [dev]
    # Only starts with: docker compose --profile dev up
    # Does NOT expose port to host by default
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Host port mapping — only active when --profile dev is used (postgres service)
    ports:
      - "5433:5432"
    volumes:
      - ./docker/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 6s
      retries: 5
    restart: unless-stopped
  
  redis:
    image: redis:7-alpine
    container_name: soc360_redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-soc360_redis_dev_password}
    # Host port mapping for local dev ONLY — do not expose in staging/production
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-soc360_redis_dev_password}", "ping"]
      interval: 10s
      timeout: 6s
      retries: 5
    restart: unless-stopped